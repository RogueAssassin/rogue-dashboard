name: Publish container

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run application tests
        run: python -m unittest discover -s tests -v

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^VERSION = "\([0-9][0-9.]*\)"/\1/p' app/dashboard.py)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "app/dashboard.py does not contain a semantic VERSION" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match application version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up multi-platform builder
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether the branch version is already published
        id: publish
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}:${{ steps.version.outputs.version }}"
          if [[ "$GITHUB_REF_TYPE" == "branch" ]] && docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "Version $image already exists; a branch push will not replace it."
            echo "required=false" >> "$GITHUB_OUTPUT"
          else
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate image metadata
        id: meta
        if: steps.publish.outputs.required == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=latest

      - name: Build and publish
        if: steps.publish.outputs.required == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: RGDASH_VERSION=${{ steps.version.outputs.version }}
          provenance: mode=max
          sbom: true
