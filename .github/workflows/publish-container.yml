name: Publish container

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run application tests
        run: python -m unittest discover -s tests -v

      - name: Validate release and Compose configuration
        run: |
          sh scripts/validate-release.sh
          python -m compileall -q app
          sh -n install.sh migrate-env.sh upgrade.sh scripts/validate-release.sh
          cp .env.example .env
          docker compose -f docker-compose.yaml config -q
          docker compose -f docker-compose.yaml -f docker-compose.build.yaml config -q
          RGDASH_EXTRA_NETWORK=application-network docker compose -f docker-compose.yaml -f docker-compose.extra-network.yaml config -q

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^VERSION = "\([0-9][0-9.]*\)"/\1/p' app/dashboard.py)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "app/dashboard.py does not contain a semantic VERSION" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match application version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up multi-platform builder
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=latest

      - name: Build and publish
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: RGDASH_VERSION=${{ steps.version.outputs.version }}
          provenance: mode=max
          sbom: true
