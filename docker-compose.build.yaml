# Developer-only override. Normal installations pull the published GHCR image.
services:
  dashboard:
    image: rogue-dashboard:dev
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RGDASH_VERSION: 1.0.0-dev

  docker-agent:
    image: rogue-dashboard:dev
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RGDASH_VERSION: 1.0.0-dev
