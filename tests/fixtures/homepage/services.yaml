- Media Automation:
    - qBittorrent:
        href: https://qbittorrent.example.com
        siteMonitor: http://qbittorrent:7800
        icon: qbittorrent.png
        description: Torrent client
        widget:
          type: qbittorrent
          url: http://qbittorrent:7800
          username: {{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}
          password: {{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}

    - Prowlarr:
        href: https://prowlarr.example.com
        siteMonitor: http://prowlarr:9696
        icon: prowlarr.png
        description: Indexer manager
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: {{HOMEPAGE_VAR_PROWLARR_KEY}}

    - Radarr:
        href: https://radarr.example.com
        siteMonitor: http://radarr:7878
        icon: radarr.png
        description: Movies
        widget:
          type: radarr
          url: http://radarr:7878
          key: {{HOMEPAGE_VAR_RADARR_KEY}}

    - Sonarr:
        href: https://sonarr.example.com
        siteMonitor: http://sonarr:8989
        icon: sonarr.png
        description: TV
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: {{HOMEPAGE_VAR_SONARR_KEY}}

    - Seerr:
        href: https://seerr.example.com
        siteMonitor: http://seerr:5055
        icon: seerr.png
        description: Requests

    - Bazarr:
        href: https://bazarr.example.com
        siteMonitor: http://bazarr:6767
        icon: bazarr.png
        description: Subtitle management
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: {{HOMEPAGE_VAR_BAZARR_KEY}}

- Media Insights:
    - Tautulli:
        href: https://tautulli.example.com
        siteMonitor: http://tautulli:8181
        icon: tautulli.png
        description: Plex monitoring
        widget:
          type: tautulli
          url: http://tautulli:8181
          key: {{HOMEPAGE_VAR_TAUTULLI_KEY}}

- Infrastructure:
    - Dozzle:
        href: https://dozzle.example.com
        siteMonitor: http://dozzle:8080
        icon: dozzle.png
        description: Docker Logs

    - Uptime Kuma:
        href: https://status.example.com
        siteMonitor: http://uptime-kuma:3001
        icon: uptime-kuma.png
        description: Service monitoring

    - Dockge:
        href: https://dockge.example.com
        siteMonitor: http://dockge:5001
        icon: dockge.png
        description: Docker Compose stack manager

- Network:
    - Pi-hole:
        href: https://pihole.example.com
        siteMonitor: http://pihole:80
        icon: pi-hole.png
        description: DNS and ad blocking
        widget:
          type: pihole
          url: http://pihole:80
          version: 6
          key: {{HOMEPAGE_VAR_PIHOLE_KEY}}

    - FlareSolverr:
        href: http://flaresolverr:8191/
        siteMonitor: http://flaresolverr:8191/
        icon: flaresolverr.png
        description: Cloudflare bypasser
        statusStyle: dot

- Admin:
    - Homepage:
        href: https://dashboard.example.com
        siteMonitor: http://homepage:3000
        icon: homepage.png
        description: Main dashboard
