<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">Rogue Dashboard</title>
  <desc id="desc">A colourful Docker command centre with live services, themes and safe controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080817"/>
      <stop offset="0.55" stop-color="#15103a"/>
      <stop offset="1" stop-color="#061b2c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff2bd6"/>
      <stop offset="0.52" stop-color="#8b5cff"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="pink"><stop stop-color="#ff2bd6" stop-opacity=".36"/><stop offset="1" stop-color="#ff2bd6" stop-opacity="0"/></radialGradient>
    <radialGradient id="cyan"><stop stop-color="#00e5ff" stop-opacity=".3"/><stop offset="1" stop-color="#00e5ff" stop-opacity="0"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="16"/></filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse"><path d="M38 0H0V38" fill="none" stroke="#9b8cff" stroke-opacity=".08"/></pattern>
  </defs>
  <rect width="1280" height="430" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="430" rx="28" fill="url(#grid)"/>
  <circle cx="150" cy="52" r="270" fill="url(#pink)"/>
  <circle cx="1135" cy="350" r="310" fill="url(#cyan)"/>
  <rect x="70" y="65" width="88" height="88" rx="25" fill="url(#brand)" filter="url(#glow)" opacity=".8"/>
  <rect x="70" y="65" width="88" height="88" rx="25" fill="url(#brand)"/>
  <text x="114" y="125" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="43" font-weight="900" text-anchor="middle">R</text>
  <text x="186" y="105" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="52" font-weight="800">Rogue Dashboard</text>
  <text x="187" y="140" fill="#b8b8d5" font-family="Inter,Segoe UI,sans-serif" font-size="20">Your colourful, local-first Docker command centre</text>
  <g font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="650">
    <g transform="translate(70 218)"><rect width="240" height="72" rx="16" fill="#ffffff" fill-opacity=".065" stroke="#ff2bd6" stroke-opacity=".42"/><circle cx="31" cy="36" r="9" fill="#ff2bd6"/><text x="52" y="33" fill="#fff">Live service metrics</text><text x="52" y="53" fill="#9f9fb8" font-size="13" font-weight="400">Apps, latency and health</text></g>
    <g transform="translate(330 218)"><rect width="240" height="72" rx="16" fill="#ffffff" fill-opacity=".065" stroke="#a679ff" stroke-opacity=".42"/><circle cx="31" cy="36" r="9" fill="#a679ff"/><text x="52" y="33" fill="#fff">Visual customisation</text><text x="52" y="53" fill="#9f9fb8" font-size="13" font-weight="400">Themes, layout and assets</text></g>
    <g transform="translate(590 218)"><rect width="240" height="72" rx="16" fill="#ffffff" fill-opacity=".065" stroke="#00e5ff" stroke-opacity=".42"/><circle cx="31" cy="36" r="9" fill="#00e5ff"/><text x="52" y="33" fill="#fff">Docker controls</text><text x="52" y="53" fill="#9f9fb8" font-size="13" font-weight="400">Restricted internal agent</text></g>
    <g transform="translate(850 218)"><rect width="240" height="72" rx="16" fill="#ffffff" fill-opacity=".065" stroke="#41d99b" stroke-opacity=".42"/><circle cx="31" cy="36" r="9" fill="#41d99b"/><text x="52" y="33" fill="#fff">GHCR deployment</text><text x="52" y="53" fill="#9f9fb8" font-size="13" font-weight="400">Pull, run and upgrade</text></g>
  </g>
  <g transform="translate(70 347)" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700">
    <rect width="142" height="38" rx="19" fill="#ff2bd6" fill-opacity=".14" stroke="#ff2bd6" stroke-opacity=".45"/><text x="71" y="25" text-anchor="middle" fill="#ffd5f7">No Node.js</text>
    <rect x="158" width="160" height="38" rx="19" fill="#8b5cff" fill-opacity=".14" stroke="#8b5cff" stroke-opacity=".5"/><text x="238" y="25" text-anchor="middle" fill="#dfd5ff">Docker Compose</text>
    <rect x="334" width="168" height="38" rx="19" fill="#00e5ff" fill-opacity=".12" stroke="#00e5ff" stroke-opacity=".45"/><text x="418" y="25" text-anchor="middle" fill="#c7faff">AMD64 + ARM64</text>
    <rect x="518" width="145" height="38" rx="19" fill="#41d99b" fill-opacity=".12" stroke="#41d99b" stroke-opacity=".45"/><text x="590" y="25" text-anchor="middle" fill="#ccffe9">Local-first</text>
  </g>
</svg>
